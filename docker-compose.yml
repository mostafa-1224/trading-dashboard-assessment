version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - TICK_INTERVAL_MS=1000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3001
        VITE_WS_URL: ws://localhost:3001
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
